name: Build and Release Binaries

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: "startsWith(github.event.head_commit.message, 'chore: bump version')"
    strategy:
      matrix:
        include:
          - target: bun-windows-x64
            output: bungraph-win-x64.exe
          - target: bun-windows-arm64
            output: bungraph-win-arm64.exe
          - target: bun-darwin-x64
            output: bungraph-macos-x64
          - target: bun-darwin-arm64
            output: bungraph-macos-arm64
          - target: bun-linux-x64
            output: bungraph-linux-x64
          - target: bun-linux-arm64
            output: bungraph-linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build binary
        run: bun build --compile --target=${{ matrix.target }} --outfile=dist/${{ matrix.output }} bin/bundag.js

      - name: Get version
        id: version
        run: echo "version=$(jq -r '.version' package.json)" >> $GITHUB_OUTPUT

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: dist/${{ matrix.output }}
          make_latest: true
